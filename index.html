<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reborn Pop Display</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <img id="slide" src="1.jpg" alt="slide image" />

  <script>
    const images = ["1.png", "2.png", "3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png", "11.jpg"];
    let current = 0;
    const slide = document.getElementById("slide");

    setInterval(() => {
      current = (current + 1) % images.length;
      slide.src = images[current];
    }, 3000);
  </script>
</body>
</html>
